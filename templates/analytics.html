{% extends "base.html" %}

{% block content %}

<div class="dashboard-container">

    <h2 style="margin-bottom: 20px; font-weight: 700; color: var(--primary);">Production Analytics Dashboard</h2>

    <div class="dashboard-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 20px; margin-bottom: 0;">

        <div class="dashboard-card" style="padding: 18px 24px; margin-bottom: 0;">
            <h3 style="font-size: 15px; font-weight: 600; color: var(--primary); margin-bottom: 10px;">Top Performing Workers</h3>
            <div style="height: 180px; position: relative;">
                <canvas id="topWorkersChart"></canvas>
            </div>
        </div>

        <div class="dashboard-card" style="padding: 18px 24px; margin-bottom: 0;">
            <h3 style="font-size: 15px; font-weight: 600; color: var(--primary); margin-bottom: 10px;">Worker Consistency Distribution</h3>
            <div style="height: 180px; position: relative;">
                <canvas id="consistencyChart"></canvas>
            </div>
        </div>

        <div class="dashboard-card" style="padding: 18px 24px; margin-bottom: 0;">
            <h3 style="font-size: 15px; font-weight: 600; color: var(--primary); margin-bottom: 10px;">Monthly Production Trend</h3>
            <div style="height: 180px; position: relative;">
                <canvas id="monthlyChart"></canvas>
            </div>
        </div>

        <div class="dashboard-card" style="padding: 18px 24px; margin-bottom: 0;">
            <h3 style="font-size: 15px; font-weight: 600; color: var(--primary); margin-bottom: 10px;">Loom Efficiency (%)</h3>
            <div style="height: 180px; position: relative;">
                <canvas id="loomChart"></canvas>
            </div>
        </div>

    </div>

    <!-- STYLE OVERRIDE FOR BUTTON TOGGLES -->
    <style>
    .toggle-section button.toggle-btn {
        background: none;
        border: none;
        outline: none;
        cursor: pointer;
        font-family: inherit;
    }
    </style>

    <!-- WORKER CONSISTENCY DETAILS CARD -->
    <div class="dashboard-card" style="padding: 24px; margin-top: 25px;">
        <h3 style="font-size: 16px; font-weight: 600; color: var(--primary); margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px;">Worker Consistency Classification</h3>
        <div class="toggle-section" style="margin-bottom: 15px; padding: 4px; border-radius: 8px; display: inline-flex; gap: 4px;">
            <button class="toggle-btn" onclick="filterConsistency('Excellent', this)" id="btn-Excellent">Excellent</button>
            <button class="toggle-btn" onclick="filterConsistency('Good', this)" id="btn-Good">Good</button>
            <button class="toggle-btn" onclick="filterConsistency('Average', this)" id="btn-Average">Average</button>
            <button class="toggle-btn" onclick="filterConsistency('Poor', this)" id="btn-Poor">Poor</button>
            <button class="toggle-btn" onclick="filterConsistency('Insufficient Data', this)" id="btn-Insufficient">Insufficient Data</button>
        </div>
        <div id="consistency-workers-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; max-height: 250px; overflow-y: auto; padding: 15px; border: 1px solid var(--border-color); border-radius: 8px; background-color: var(--bg-main);">
            <!-- Worker names will be dynamically injected here by JS -->
        </div>
    </div>

</div>

<!-- JSON DATA BLOCKS (NO JS ERRORS) -->

<script id="top-workers-data" type="application/json">
{{ top_workers | tojson }}
</script>

<script id="monthly-data" type="application/json">
{{ monthly_trend | tojson }}
</script>

<script id="loom-data" type="application/json">
{{ loom_efficiency | tojson }}
</script>

<script id="consistency-data" type="application/json">
{{ consistency_data | tojson }}
</script>


<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

/* ===============================
   PARSE DATA SAFELY
================================= */

const workerRaw = JSON.parse(document.getElementById("top-workers-data").textContent);
const monthlyRaw = JSON.parse(document.getElementById("monthly-data").textContent);
const loomRaw = JSON.parse(document.getElementById("loom-data").textContent);
const consistencyRaw = JSON.parse(document.getElementById("consistency-data").textContent);


/* ===============================
   TOP WORKERS BAR CHART
================================= */

let chartInstances = {};

function getChartColors() {
    const isDark = document.body.classList.contains('dark-theme');
    return {
        titleColor: isDark ? '#4db6ac' : '#104f55',
        labelColor: isDark ? '#b0bec5' : '#627275',
        gridColor: isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.08)',
        barBg: isDark ? '#26a69a' : '#104f55',
        lineBorder: isDark ? '#4db6ac' : '#104f55',
        lineBg: isDark ? 'rgba(77, 182, 172, 0.25)' : 'rgba(16, 79, 85, 0.15)',
        legendText: isDark ? '#e0f2f1' : '#1d2b2d'
    };
}

function renderAnalyticsCharts() {
    const c = getChartColors();
    
    Object.keys(chartInstances).forEach(key => {
        if (chartInstances[key]) chartInstances[key].destroy();
    });

    chartInstances.topWorkers = new Chart(document.getElementById("topWorkersChart"), {
        type: "bar",
        data: {
            labels: workerNames,
            datasets: [{
                label: "Meters Weaved",
                data: workerOutput,
                backgroundColor: c.barBg
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                x: {
                    title: { display: true, text: 'Worker Name', color: c.titleColor, font: { weight: 'bold', size: 12 } },
                    ticks: { color: c.labelColor },
                    grid: { color: c.gridColor }
                },
                y: {
                    title: { display: true, text: 'Meters Weaved (m)', color: c.titleColor, font: { weight: 'bold', size: 12 } },
                    ticks: { color: c.labelColor },
                    grid: { color: c.gridColor }
                }
            }
        }
    });

    chartInstances.monthly = new Chart(document.getElementById("monthlyChart"), {
        type: "line",
        data: {
            labels: months,
            datasets: [{
                label: "Meters Weaved",
                data: monthlyData,
                borderColor: c.lineBorder,
                backgroundColor: c.lineBg,
                fill: true,
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: {
                    title: { display: true, text: 'Date / Month', color: c.titleColor, font: { weight: 'bold', size: 12 } },
                    ticks: { color: c.labelColor },
                    grid: { color: c.gridColor }
                },
                y: {
                    title: { display: true, text: 'Meters Weaved (m)', color: c.titleColor, font: { weight: 'bold', size: 12 } },
                    ticks: { color: c.labelColor },
                    grid: { color: c.gridColor }
                }
            }
        }
    });

    chartInstances.loom = new Chart(document.getElementById("loomChart"), {
        type: "bar",
        data: {
            labels: loomNames,
            datasets: [{
                label: "Efficiency %",
                data: loomValues,
                backgroundColor: c.barBg
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: {
                    title: { display: true, text: 'Efficiency (%)', color: c.titleColor, font: { weight: 'bold', size: 12 } },
                    ticks: { color: c.labelColor },
                    grid: { color: c.gridColor }
                },
                y: {
                    title: { display: true, text: 'Loom Number', color: c.titleColor, font: { weight: 'bold', size: 12 } },
                    ticks: { color: c.labelColor },
                    grid: { color: c.gridColor }
                }
            }
        }
    });

    chartInstances.consistency = new Chart(document.getElementById("consistencyChart"), {
        type: "doughnut",
        data: {
            labels: Object.keys(categoryCount),
            datasets: [{
                data: Object.values(categoryCount),
                backgroundColor: [
                    "#2ecc71",
                    "#27ae60",
                    "#f39c12",
                    "#e74c3c",
                    "#95a5a6"
                ]
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'right',
                    labels: { color: c.legendText }
                }
            }
        }
    });
}

window.renderCharts = renderAnalyticsCharts;
renderAnalyticsCharts();


/* ===============================
   WORKER CONSISTENCY FILTER FUNCTION
================================= */

function filterConsistency(category, btnElement) {
    const container = btnElement.parentElement;
    container.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active-toggle'));
    btnElement.classList.add('active-toggle');
    
    const workers = consistencyRaw
        .filter(item => item[1] === category)
        .map(item => item[0])
        .sort();
        
    const listContainer = document.getElementById("consistency-workers-list");
    listContainer.innerHTML = "";
    
    if (workers.length > 0) {
        workers.forEach(name => {
            const div = document.createElement("div");
            div.style.padding = "10px 14px";
            div.style.backgroundColor = "white";
            div.style.border = "1px solid var(--border-color)";
            div.style.borderRadius = "8px";
            div.style.fontWeight = "500";
            div.style.fontSize = "14px";
            div.style.boxShadow = "0 2px 5px rgba(0,0,0,0.01)";
            div.style.display = "flex";
            div.style.alignItems = "center";
            div.style.gap = "10px";
            
            const dot = document.createElement("span");
            dot.style.height = "10px";
            dot.style.width = "10px";
            dot.style.borderRadius = "50%";
            
            if (category === "Excellent") dot.style.backgroundColor = "#2ecc71";
            else if (category === "Good") dot.style.backgroundColor = "#27ae60";
            else if (category === "Average") dot.style.backgroundColor = "#f39c12";
            else if (category === "Poor") dot.style.backgroundColor = "#e74c3c";
            else dot.style.backgroundColor = "#95a5a6";
            
            div.appendChild(dot);
            
            const textNode = document.createTextNode(name);
            div.appendChild(textNode);
            
            listContainer.appendChild(div);
        });
    } else {
        listContainer.innerHTML = `<div style="grid-column: 1 / -1; text-align: center; color: var(--text-muted); padding: 25px; font-style: italic;">No workers found in this category.</div>`;
    }
}

// Auto-select category with data on load
document.addEventListener("DOMContentLoaded", () => {
    const categories = ['Excellent', 'Good', 'Average', 'Poor', 'Insufficient Data'];
    const ids = ['btn-Excellent', 'btn-Good', 'btn-Average', 'btn-Poor', 'btn-Insufficient'];
    
    let activeIndex = 1; // Default to Good
    for (let i = 0; i < categories.length; i++) {
        const count = consistencyRaw.filter(item => item[1] === categories[i]).length;
        if (count > 0) {
            activeIndex = i;
            break;
        }
    }
    
    filterConsistency(categories[activeIndex], document.getElementById(ids[activeIndex]));
});

</script>

{% endblock %}
