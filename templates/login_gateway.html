<!DOCTYPE html>
<html>
<head>
    <title>Jaikrishna Weaving Mills Portal</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Blurred Background */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("/static/bg.jpg") no-repeat center center/cover;
            filter: blur(5px);
            z-index: -2;
        }

        /* Corporate Teal Overlay */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 59, 63, 0.6);
            z-index: -1;
        }

        .title {
            text-align: center;
            margin-top: 70px;
            font-size: 34px;
            font-weight: 700;
            color: white;
            letter-spacing: 0.5px;
        }

        .gateway-card {
            background: rgba(255, 255, 255, 0.95);
            width: 450px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin: 60px auto;
            text-align: center;
        }

        h2 {
            color: #104f55;
            font-weight: 700;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            font-size: 15px;
            margin-bottom: 40px;
        }

        .portal-options {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .portal-btn {
            display: block;
            text-decoration: none;
            padding: 16px;
            background-color: #104f55;
            color: white;
            border-radius: 8px;
            font-size: 17px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .portal-btn:hover {
            background-color: #0c3e43;
            transform: translateY(-2px);
        }

        .portal-btn.supervisor {
            background-color: #2c3e50;
        }

        .portal-btn.supervisor:hover {
            background-color: #1a252f;
        }
    </style>
</head>

<body>

<div class="title">
    Jaikrishna Weaving Mills
</div>

<div class="gateway-card">
    <h2>System Gateway</h2>
    <p>Please select your login section to proceed:</p>

    <div class="portal-options">
        <a href="/login/admin" class="portal-btn">
            Admin Portal
        </a>
        <a href="/login/supervisor" class="portal-btn supervisor">
            Supervisor Portal
        </a>
    </div>
</div>

</body>
</html>
