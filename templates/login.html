<!DOCTYPE html>
<html>
<head>
    <title>Manager Login</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Blurred Background */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("/static/bg.jpg") no-repeat center center/cover;
            filter: blur(5px);
            z-index: -2;
        }

        /* Corporate Teal Overlay */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 59, 63, 0.6);
            z-index: -1;
        }

        .title {
            text-align: center;
            margin-top: 70px;
            font-size: 34px;
            font-weight: 700;
            color: white;
            letter-spacing: 0.5px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            width: 400px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin: 60px auto;
        }

        h2 {
            text-align: center;
            color: #104f55;
            font-weight: 700;
            margin-bottom: 30px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 25px;
            border-radius: 8px;
            border: 1px solid #cddde0;
            font-size: 15px;
            box-sizing: border-box;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #1b6f7a;
            box-shadow: 0 0 0 3px rgba(27, 111, 122, 0.15);
        }

        .password-box {
            position: relative;
        }

        .password-box input {
            padding-right: 40px;
        }

        .eye {
            position: absolute;
            right: 12px;
            top: 35%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #104f55;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #0c3e43;
            transform: translateY(-1px);
        }
    </style>
</head>

<body>

<div class="title">
    Jaikrishna Weaving Mills
</div>

<div class="login-card">
    <h2>{{ role_title }} Login</h2>
    <a href="/login" style="display: block; margin-bottom: 20px; color: #1b6f7a; text-decoration: none; font-size: 14px; font-weight: bold; text-align: center;">← Back to Portals</a>

    <!-- TOAST POPUP (TOP RIGHT) IN CARD -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div style="background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; padding: 10px; border-radius: 4px; margin-bottom: 20px; text-align: center; font-size: 14px;">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>

        <div class="password-box">
            <input type="password" id="password" name="password" placeholder="Password" required>
            <span class="eye" onclick="togglePassword()">👁</span>
        </div>

        <button type="submit">Login</button>
    </form>
</div>

<script>
function togglePassword() {
    const pwd = document.getElementById("password");
    pwd.type = pwd.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
